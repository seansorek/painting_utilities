name: Auto-merge approved PRs

on:
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.event_name == 'check_suite'
    steps:
      - name: Enable auto-merge for approved PRs
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber;
            if (context.payload.pull_request) {
              prNumber = context.payload.pull_request.number;
            } else if (context.payload.check_suite) {
              const prs = context.payload.check_suite.pull_requests;
              if (!prs || prs.length === 0) return;
              prNumber = prs[0].number;
            }
            if (!prNumber) return;

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            if (pr.data.draft) return;

            const labels = pr.data.labels.map(l => l.name);
            if (labels.includes('hold')) return;

            const hasReviewedLabel = labels.includes('Reviewed');

            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            const hasApproval = reviews.data.some(r => r.state === 'APPROVED');

            if (!hasReviewedLabel && !hasApproval) return;

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
              });
              console.log(`Auto-merged PR #${prNumber}`);
            } catch (e) {
              console.log(`Cannot merge PR #${prNumber} yet: ${e.message}`);
            }
