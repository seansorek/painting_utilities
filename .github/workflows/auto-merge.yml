name: Auto-merge reviewed PRs

on:
  pull_request:
    types: [labeled, unlabeled, synchronize, opened, reopened, ready_for_review]
  check_suite:
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to attempt merging"
        required: true

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Attempt auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            // Resolve PR number from any of the supported triggers
            let prNumber;
            if (context.eventName === 'workflow_dispatch') {
              prNumber = parseInt(context.payload.inputs.pr_number, 10);
            } else if (context.payload.pull_request) {
              prNumber = context.payload.pull_request.number;
            } else if (context.payload.check_suite) {
              const prs = context.payload.check_suite.pull_requests || [];
              if (prs.length === 0) {
                console.log('check_suite has no associated PRs, skipping');
                return;
              }
              prNumber = prs[0].number;
            }
            if (!prNumber) {
              console.log('Could not resolve PR number, skipping');
              return;
            }

            const pr = (await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            })).data;

            if (pr.state !== 'open') {
              console.log(`PR #${prNumber} is ${pr.state}, skipping`);
              return;
            }
            if (pr.draft) {
              console.log(`PR #${prNumber} is a draft, skipping`);
              return;
            }

            const labels = pr.labels.map(l => l.name);
            const blockers = ['Changes Requested', 'hold', 'ci-failing', 'do-not-merge', 'WIP'];
            const blocker = blockers.find(b => labels.includes(b));
            if (blocker) {
              console.log(`PR #${prNumber} has blocking label "${blocker}", skipping`);
              return;
            }
            if (!labels.includes('Reviewed')) {
              console.log(`PR #${prNumber} does not have "Reviewed" label, skipping`);
              return;
            }

            // Verify ALL status checks are green
            const sha = pr.head.sha;
            const checkRuns = (await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
            })).data.check_runs;
            // Exclude this workflow's own run from the check
            const relevant = checkRuns.filter(c => c.name !== 'Attempt auto-merge' && !c.name.toLowerCase().includes('auto-merge'));
            const notPassing = relevant.filter(c => c.conclusion !== 'success' && c.conclusion !== 'skipped' && c.conclusion !== 'neutral');
            if (notPassing.length > 0) {
              console.log(`PR #${prNumber} has ${notPassing.length} non-passing checks: ${notPassing.map(c => c.name + '=' + (c.conclusion || c.status)).join(', ')}`);
              return;
            }

            // Also check legacy commit statuses
            const statuses = (await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
            })).data;
            if (statuses.state !== 'success' && statuses.statuses.length > 0) {
              console.log(`PR #${prNumber} combined status is ${statuses.state}, skipping`);
              return;
            }

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
              });
              console.log(`Auto-merged PR #${prNumber}`);
            } catch (e) {
              console.log(`Failed to merge PR #${prNumber}: ${e.message}`);
            }
